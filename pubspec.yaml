name: didit
description: A social media app where you decide what your friend posts, and they decide what you 
  post.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0-76.0.dev <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  go_router: ^6.0.1
  flutter_bloc: ^8.1.1
  parse_server_sdk_flutter: ^3.1.3
  url_launcher: ^6.1.7
  freezed_annotation: ^2.2.0
  json_annotation: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  build_runner: ^2.3.3
  freezed: ^2.3.2
  json_serializable: ^6.5.4

flutter:

  uses-material-design: true