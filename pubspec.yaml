name: didit
description: A photo sharing app where you randomly match with three friends, get a theme, and each 
  of you posts a photo related to that theme.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0-76.0.dev <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  go_router: ^6.0.1
  flutter_bloc: ^8.1.1
  parse_server_sdk_flutter: ^3.1.3
  url_launcher: ^6.1.7
  freezed_annotation: ^2.2.0
  json_annotation: ^4.7.0
  flutter_native_splash: ^2.2.16
  cached_network_image: ^3.2.3
  firebase_core: ^2.4.1
  firebase_messaging: ^14.2.1
  permission_handler: ^10.2.0
  firebase_auth: ^4.2.5
  intl_phone_number_input: ^0.7.2
  share_plus: ^6.3.0
  path_provider: ^2.0.12
  image_picker: ^0.8.6+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  build_runner: ^2.3.3
  freezed: ^2.3.2
  json_serializable: ^6.5.4

flutter:

  uses-material-design: true